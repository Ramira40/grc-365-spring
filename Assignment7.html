<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Contact form</title>
<style>
    h1 {
        text-align: center;
        font-weight: normal;
    }
    form {
        width: 600px;
        min-height: 600px;
        padding: 24px;
        background: gold;
        margin: 36px auto;
        border: 1px solid goldenrod;
        box-shadow: 2px 3px 6px goldenrod;
        border-radius: 18px;
        font: 14pt/1.2em sans-serif;
    }
    fieldset {
        margin-top: 18px;
    }
    #personal input, #submit {
        width: 100%;
        height: 24px;
        margin-bottom: 12px;
    }
    input[type="text"] {
        width: 98%;
        font: 14pt/1.2em sans-serif;
        margin-top: 6px;
    }

    input[type="submit"] {
        width: 100px;
        height: 40px;
        background: lightgreen;
        margin: 6px auto;
        display: block;
        border-radius: 6px;
        border: 1px solid dimgray;
        font: 14pt/1.4em sans-serif;
    }
</style>
</head>

<body>
<form action="#" method="post">
    <h1>Contact Us</h1>

    <input type="text" /><br/>
    <label>First Name</label><br/>

    <input type="text"><br/>
    <label>Last Name</label><br/>

    <fieldset>
        <legend>Reason for contacting us</legend>
        <input type="radio" name="service">
        <label>Project inquiry&nbsp;</label>
        <br/>

        <input type="radio" name="service">
        <label>Billing question</label>
        <br/>

        <input type="radio" name="service">
        <label>Technical support&nbsp;</label>
        <br/>

        <input type="radio" name="service">
        <label>Account issue&nbsp;</label>
    </fieldset>

    <fieldset>
        <legend>Contact preference&nbsp;</legend>

        <input type="checkbox">
        <label>Email&nbsp;</label>
        <br/>

        <input type="checkbox">
        <label>Phone call&nbsp;</label>
        <br/>

        <input type="checkbox">
        <label>Video meeting&nbsp;</label>
        <br/>

        <input type="checkbox">
        <label>In-person meeting&nbsp;</label>
    </fieldset>

    <fieldset>
        <legend>Priority Level&nbsp;</legend>
        <select>
          <option>Low</option>
            <option>Medium</option>
            <option>High</option>
            <option>Urgent</option>
        </select>
    </fieldset>

  <label>Message</label><br/>
  <textarea rows="5" cols="72"></textarea>

  <input type="submit" />
</form>
</body>
</html>
