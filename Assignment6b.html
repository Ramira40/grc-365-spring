<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Grid Layout</title>
<style>
    body {
        background: whitesmoke;
    }
	#title {
		text-align: center;
		font-family: Verdana,sans-serif;
		font-size: 48px;
		margin: 10px 0 20px 0;
	}
	
    #container {
        width: 800px;
        height: 800px;
        background: white;
        border: 1px solid dimgray;
        margin: 0 auto;

        display: grid;
        grid-template-columns: 60% 40%;
        grid-template-rows: repeat(3, 1fr);
    }

    #container div {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
	
	 #container div:nth-child(1) {
        grid-row: 1 / 4; 
        grid-column: 1 / 2;
    }

    #container div:nth-child(2) { grid-row: 1; grid-column: 2; }
    #container div:nth-child(3) { grid-row: 2; grid-column: 2; }
    #container div:nth-child(4) { grid-row: 3; grid-column: 2; }
	
</style>
</head>

<body>
	
	<h1 id="title" >Birds In The Wild</h1>
	
    <div id="container">
      <div><img src="grid layout 6b/bird1.jpg"></div>
        <div><img src="grid layout 6b/bird2.jpg"></div>
        <div><img src="grid layout 6b/bird3.jpg"></div>
        <div><img src="grid layout 6b/bird4.jpg"></div>
</div>
	
</body>
</html>
